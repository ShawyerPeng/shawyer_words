<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shawyer Words Home UI Capture</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f5fa;
        --surface: #ffffff;
        --surface-soft: #f1f4f9;
        --text: #1b2030;
        --text-soft: #8f97ab;
        --text-muted: #c4cad6;
        --accent: #0bc58c;
        --accent-soft: #e8fbf5;
        --line: rgba(13, 23, 48, 0.08);
        --shadow-lg: 0 18px 32px rgba(10, 22, 51, 0.08);
        --shadow-card: 0 20px 34px rgba(13, 23, 48, 0.08);
        --radius-xl: 34px;
        --radius-lg: 30px;
        --radius-md: 24px;
        --radius-pill: 999px;
      }

      * {
        box-sizing: border-box;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, #fbfcff 0%, #f3f5fa 38%, #e9edf6 100%);
        font-family:
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          "Helvetica Neue",
          sans-serif;
        color: var(--text);
      }

      .app-screen {
        position: relative;
        width: 393px;
        height: 852px;
        overflow: hidden;
        border-radius: 36px;
        background:
          linear-gradient(180deg, #f6f7fb 0%, #eff2f8 52%, #eef2f8 100%);
        box-shadow: 0 26px 80px rgba(39, 55, 88, 0.18);
      }

      .scroll-area {
        height: 100%;
        padding: 8px 18px 124px;
      }

      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 2px 8px 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .status-left {
        min-width: 40px;
      }

      .status-center {
        width: 126px;
        height: 37px;
        border-radius: 999px;
        background: #0c0d11;
      }

      .status-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .signal {
        display: inline-flex;
        align-items: flex-end;
        gap: 2px;
        height: 12px;
      }

      .signal span {
        width: 3px;
        border-radius: 999px;
        background: #10131d;
      }

      .signal span:nth-child(1) {
        height: 4px;
        opacity: 0.35;
      }

      .signal span:nth-child(2) {
        height: 6px;
        opacity: 0.5;
      }

      .signal span:nth-child(3) {
        height: 8px;
        opacity: 0.7;
      }

      .signal span:nth-child(4) {
        height: 10px;
      }

      .wifi {
        position: relative;
        width: 16px;
        height: 12px;
      }

      .wifi::before,
      .wifi::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border: 2px solid #10131d;
        border-bottom: 0;
        border-radius: 999px 999px 0 0;
      }

      .wifi::before {
        top: 0;
        width: 16px;
        height: 10px;
      }

      .wifi::after {
        top: 4px;
        width: 10px;
        height: 6px;
      }

      .battery {
        position: relative;
        width: 26px;
        height: 13px;
        border: 2px solid #10131d;
        border-radius: 4px;
      }

      .battery::before {
        content: "";
        position: absolute;
        top: 3px;
        right: -5px;
        width: 3px;
        height: 5px;
        border-radius: 0 2px 2px 0;
        background: #10131d;
      }

      .battery::after {
        content: "";
        position: absolute;
        inset: 2px;
        width: 58%;
        border-radius: 2px;
        background: #10131d;
      }

      .content-stack {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .top-actions {
        display: grid;
        grid-template-columns: 46px 1fr 46px;
        gap: 8px;
      }

      .icon-button,
      .search-button,
      .coach-button,
      .nav-item {
        background: var(--surface);
        border: 0;
      }

      .icon-button {
        height: 46px;
        width: 46px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        box-shadow: 0 8px 16px rgba(255, 255, 255, 0.4);
      }

      .search-button {
        height: 46px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 12px;
        border-radius: 22px;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 600;
      }

      .search-button .icon {
        flex: 0 0 auto;
      }

      .search-label {
        display: inline-block;
        min-width: max-content;
        white-space: nowrap;
        letter-spacing: 0;
      }

      .coach-card {
        display: grid;
        grid-template-columns: 50px 116px 64px;
        gap: 12px;
        align-items: center;
        padding: 16px;
        background: var(--surface);
        border-radius: 28px;
        box-shadow: var(--shadow-card);
      }

      .coach-icon {
        width: 50px;
        height: 50px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: var(--accent-soft);
      }

      .coach-copy {
        display: flex;
        flex-direction: column;
        gap: 5px;
        width: 116px;
        padding-right: 2px;
      }

      .coach-title {
        font-size: 14px;
        line-height: 1.14;
        font-weight: 700;
      }

      .coach-subtitle {
        font-size: 11px;
        line-height: 1.22;
        color: #60697d;
      }

      .text-line {
        display: block;
      }

      .coach-button {
        border: 0;
        color: #ffffff;
        background: var(--accent);
        border-radius: 18px;
        width: 64px;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 700;
      }

      .library-switcher {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .switcher-muted,
      .switcher-active {
        font-size: 15px;
        font-weight: 800;
        line-height: 1.1;
      }

      .switcher-muted {
        color: #adb3c0;
        padding-top: 2px;
      }

      .switcher-active-wrap {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .switcher-indicator {
        width: 20px;
        height: 4px;
        border-radius: var(--radius-pill);
        background: var(--accent);
      }

      .library-switcher .spacer {
        flex: 1;
      }

      .course-rail {
        display: flex;
        gap: 12px;
        overflow: hidden;
      }

      .course-card {
        position: relative;
        flex: 0 0 224px;
        border-radius: 24px;
        overflow: hidden;
        background: var(--surface);
        box-shadow: 0 16px 24px rgba(13, 23, 48, 0.07);
      }

      .course-hero {
        position: relative;
        height: 144px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .course-card.warm .course-hero {
        background: linear-gradient(135deg, #d39b7b 0%, #7b4c40 100%);
      }

      .course-card.ielts .course-hero {
        background: linear-gradient(135deg, #fff089 0%, #f6c312 100%);
      }

      .course-card.speak .course-hero {
        background: linear-gradient(135deg, #67606d 0%, #2b2d3a 100%);
      }

      .course-chip {
        width: fit-content;
        padding: 6px 9px;
        border-radius: var(--radius-pill);
        background: rgba(255, 255, 255, 0.24);
        font-size: 12px;
        font-weight: 700;
        color: #ffffff;
      }

      .course-card.ielts .course-chip {
        background: rgba(255, 255, 255, 0.45);
        color: #1d2333;
      }

      .course-title {
        position: relative;
        z-index: 1;
        width: 156px;
        font-size: 15px;
        line-height: 1.14;
        font-weight: 800;
        color: #ffffff;
      }

      .course-card.ielts .course-title {
        color: #1d2333;
      }

      .course-orb {
        position: absolute;
        right: -12px;
        bottom: -18px;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
      }

      .course-meta {
        padding: 12px 16px 14px;
        font-size: 13px;
        color: #8e95a8;
      }

      .article-filter {
        display: flex;
        align-items: center;
      }

      .article-filter-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 15px;
        font-weight: 800;
      }

      .article-filter .spacer {
        flex: 1;
      }

      .article-card {
        padding: 18px;
        border-radius: 28px;
        background: var(--surface);
        box-shadow: 0 18px 30px rgba(10, 22, 51, 0.07);
      }

      .article-title {
        font-size: 16px;
        line-height: 1.24;
        font-weight: 800;
      }

      .article-subtitle {
        margin-top: 10px;
        font-size: 13px;
        line-height: 1.24;
        color: #99a0b3;
      }

      .article-footer {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 18px;
        font-size: 13px;
        color: #99a0b3;
      }

      .bottom-nav {
        position: absolute;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        width: 330px;
        padding: 7px;
        background: var(--surface);
        border-radius: 28px;
        box-shadow: var(--shadow-lg);
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        min-width: 0;
        padding: 10px 6px;
        border-radius: 22px;
      }

      .nav-item.active {
        background: #e2f8f0;
      }

      .nav-label {
        display: inline-block;
        min-width: max-content;
        white-space: nowrap;
        font-size: 12px;
        font-weight: 800;
        color: #2c3242;
      }

      .nav-item:not(.active) .nav-label {
        font-weight: 600;
      }

      .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #252938;
      }

      .icon svg {
        display: block;
      }

      .icon-accent {
        color: var(--accent);
      }

      .icon-soft {
        color: #8d95a9;
      }

      .icon-muted {
        color: #9aa2b4;
      }

      .icon-faint {
        color: #d0d5e0;
      }
    </style>
  </head>
  <body>
    <main class="app-screen">
      <div class="scroll-area">
        <header class="status-bar">
          <div class="status-left">15:27</div>
          <div class="status-center"></div>
          <div class="status-right">
            <div class="signal">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="wifi"></div>
            <div class="battery"></div>
          </div>
        </header>

        <div class="content-stack">
          <section class="top-actions" aria-label="Top Actions">
            <button class="icon-button" type="button" aria-label="Open menu">
              <span class="icon" aria-hidden="true">
                <svg width="28" height="22" viewBox="0 0 28 22" fill="none">
                  <rect x="1" y="2" width="26" height="3" rx="1.5" fill="currentColor"></rect>
                  <rect x="1" y="9.5" width="20" height="3" rx="1.5" fill="currentColor"></rect>
                  <rect x="1" y="17" width="26" height="3" rx="1.5" fill="currentColor"></rect>
                </svg>
              </span>
            </button>

            <button class="search-button" type="button" aria-label="Open search">
              <span class="icon" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="12" cy="12" r="7.5" stroke="currentColor" stroke-width="3"></circle>
                  <path d="M18 18L24 24" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                </svg>
              </span>
              <span class="search-label">查单词或搜索文章</span>
            </button>

            <button class="icon-button" type="button" aria-label="Open rewards">
              <span class="icon" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <rect x="4" y="8" width="20" height="16" rx="3" stroke="currentColor" stroke-width="2.5"></rect>
                  <path d="M9 8C9 5.791 10.791 4 13 4H15C17.209 4 19 5.791 19 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>
                  <path d="M4 13H24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>
                  <path d="M14 12V18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>
                  <path d="M11 15H17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>
                </svg>
              </span>
            </button>
          </section>

          <section class="coach-card" aria-label="Coach Hero Card">
            <div class="coach-icon">
              <span class="icon icon-accent" aria-hidden="true">
                <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
                  <rect x="12" y="4" width="10" height="18" rx="5" stroke="currentColor" stroke-width="3"></rect>
                  <path d="M8 15.5C8 20.194 11.806 24 16.5 24H17.5C22.194 24 26 20.194 26 15.5" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                  <path d="M17 24V30" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                  <path d="M13 30H21" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                </svg>
              </span>
            </div>
            <div class="coach-copy">
              <h1 class="coach-title">
                <span class="text-line">Hi，我是你的AI</span>
                <span class="text-line">口语教练。</span>
              </h1>
              <p class="coach-subtitle">
                <span class="text-line">现在就开始你的口语</span>
                <span class="text-line">练习吧！</span>
              </p>
            </div>
            <button class="coach-button" type="button">聊一聊</button>
          </section>

          <section class="library-switcher" aria-label="Library Switcher">
            <h2 class="switcher-muted">我的学习库</h2>
            <div class="switcher-active-wrap">
              <h2 class="switcher-active">学习广场</h2>
              <div class="switcher-indicator"></div>
            </div>
            <div class="spacer"></div>
            <span class="icon icon-soft" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M6 3L12 9L6 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
          </section>

          <section class="course-rail" aria-label="Course Carousel">
            <article class="course-card warm" aria-label="Course Card Warm-up">
              <div class="course-hero">
                <div class="course-chip">Warm-up</div>
                <h3 class="course-title">地道口语1000句</h3>
                <div class="course-orb"></div>
              </div>
              <p class="course-meta">13 文章</p>
            </article>

            <article class="course-card ielts" aria-label="Course Card IELTS">
              <div class="course-hero">
                <div class="course-chip">IELTS</div>
                <h3 class="course-title">雅思阅读高频话题30篇</h3>
                <div class="course-orb"></div>
              </div>
              <p class="course-meta">30 文章</p>
            </article>

            <article class="course-card speak" aria-label="Course Card Speak">
              <div class="course-hero">
                <div class="course-chip">Speak</div>
                <h3 class="course-title">美式口语 · 场景表达</h3>
                <div class="course-orb"></div>
              </div>
              <p class="course-meta">20 文章</p>
            </article>
          </section>

          <section class="article-filter" aria-label="Article Filter">
            <div class="article-filter-label">
              <span>全部</span>
              <span class="icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M3 6L8 11L13 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </span>
            </div>
            <div class="spacer"></div>
            <span class="icon icon-muted" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <path d="M4 6H18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
                <path d="M4 11H18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
                <path d="M4 16H18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
                <circle cx="8" cy="6" r="2" fill="white" stroke="currentColor" stroke-width="2"></circle>
                <circle cx="14" cy="11" r="2" fill="white" stroke="currentColor" stroke-width="2"></circle>
                <circle cx="11" cy="16" r="2" fill="white" stroke="currentColor" stroke-width="2"></circle>
              </svg>
            </span>
          </section>

          <section class="article-card" aria-label="Article Card">
            <h3 class="article-title">【使用说明】创建你的英语学习资料</h3>
            <p class="article-subtitle">How to create your own English learning material</p>
            <div class="article-footer">
              <span>今天</span>
              <span class="icon icon-faint" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path d="M9 15.3L2.8 9.5C1.5 8.3 1.5 6.1 2.8 4.9C4 3.8 5.9 3.8 7.1 4.9L9 6.6L10.9 4.9C12.1 3.8 14 3.8 15.2 4.9C16.5 6.1 16.5 8.3 15.2 9.5L9 15.3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
                </svg>
              </span>
            </div>
          </section>
        </div>
      </div>

      <nav class="bottom-nav" aria-label="Bottom Navigation">
        <button class="nav-item" type="button" aria-label="Phrase Book Tab">
          <span class="icon" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <path d="M7 10H21" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></path>
              <path d="M7 15H18" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></path>
              <path d="M7 20H21" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></path>
              <path d="M7 6L9 8L11.5 5.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </span>
          <span class="nav-label">句库</span>
        </button>

        <button class="nav-item active" type="button" aria-label="New Study Tab">
          <span class="icon" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <path d="M14 6V22" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
              <path d="M6 14H22" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
            </svg>
          </span>
          <span class="nav-label">新学习</span>
        </button>

        <button class="nav-item" type="button" aria-label="Vocabulary Tab">
          <span class="icon" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <path d="M8 6.5H18C19.657 6.5 21 7.843 21 9.5V21.5H10C8.343 21.5 7 20.157 7 18.5V7.5C7 6.948 7.448 6.5 8 6.5Z" stroke="currentColor" stroke-width="2.4"></path>
              <path d="M21 9.5H10.5C9.119 9.5 8 10.619 8 12V21.5" stroke="currentColor" stroke-width="2.4"></path>
              <path d="M12 13H17" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
            </svg>
          </span>
          <span class="nav-label">背单词</span>
        </button>
      </nav>
    </main>
  </body>
</html>
